<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor Pro 3D/AR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #ui { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(10, 10, 10, 0.85); padding: 15px; 
            border-radius: 20px; color: white; width: 92%; max-width: 400px; 
            border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(12px);
            max-height: 45vh; overflow-y: auto; pointer-events: auto;
        }

        #ui.hidden { display: none; }
        #close-menu { background: none; border: none; color: #ff4444; float: right; cursor: pointer; font-size: 20px; font-weight: bold; }
        
        .section-title { font-size: 11px; font-weight: bold; color: #55acee; text-transform: uppercase; margin-top: 15px; letter-spacing: 1px; }
        label { font-size: 9px; text-transform: uppercase; color: #aaa; display: block; margin-top: 8px; }
        
        select, input[type="range"] { 
            width: 100%; margin-top: 4px; background: rgba(255,255,255,0.08); color: white; 
            border: 1px solid #444; padding: 8px; border-radius: 8px; font-size: 13px;
            box-sizing: border-box; 
        }

        .row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: #55acee; }
        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 12px 0; }
        
        /* Ajuste para sliders más finos */
        input[type="range"] { height: 4px; appearance: none; background: #333; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 15px; height: 15px; background: #55acee; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="close-menu">✕</button>
        <div style="font-size: 14px; font-weight: bold;">VISOR AR PROFESIONAL</div>
        
        <div class="section-title">Objeto</div>
        <label>Modelo 3D</label>
        <select id="model-select"><option>Cargando...</option></select>
        
        <label>Rotación Manual</label>
        <input type="range" id="model-rotation" min="0" max="6.28" step="0.01" value="0">
        
        <div class="row">
            <label style="margin:0">Auto-Giro</label>
            <input type="checkbox" id="auto-rotate">
        </div>

        <div class="section-title">Ambiente (HDR)</div>
        <label>Exposición HDR</label>
        <input type="range" id="exposure-slider" min="0.1" max="4" step="0.1" value="1.2">
        
        <div class="section-title">Iluminación Real</div>
        <label>Ángulo de Luz</label>
        <input type="range" id="light-angle" min="0" max="6.28" step="0.01" value="0.7">
        
        <label>Intensidad</label>
        <input type="range" id="light-intensity" min="0" max="4" step="0.1" value="1">
        
        <label>Opacidad Sombra</label>
        <input type="range" id="shadow-opacity" min="0" max="1" step="0.05" value="0.4">
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
