<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor Pro 3D/AR</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #ui { 
            position: absolute; 
            top: 0; left: 0; bottom: 0; /* Barra lateral izquierda en PC */
            z-index: 1000; background: rgba(10, 10, 10, 0.9); padding: 20px; 
            color: white; width: 260px; border-right: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px); overflow-y: auto; pointer-events: auto;
            transition: all 0.3s ease;
        }

        /* AJUSTE PARA MÓVIL (AR y Vista Normal Móvil) */
        @media (max-width: 600px) {
            #ui {
                top: auto; bottom: 10px; left: 50%; transform: translateX(-50%);
                width: 85%; height: auto; max-height: 40vh; 
                border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
                padding: 15px; border-right: none;
            }
            .section-title { margin-top: 10px !important; }
            label { font-size: 8px !important; }
            select, input[type="range"] { padding: 6px !important; font-size: 11px !important; }
        }

        /* Forzar que se vea bien dentro de AR */
        :xr-overlay #ui {
            background: rgba(0, 0, 0, 0.6) !important;
            margin-bottom: 10px;
        }

        #ui.hidden { transform: translateX(-110%); }
        @media (max-width: 600px) { #ui.hidden { transform: translate(-50%, 110%); } }

        #close-menu { background: none; border: none; color: #ff4444; float: right; cursor: pointer; font-size: 20px; font-weight: bold; }
        .section-title { font-size: 11px; font-weight: bold; color: #55acee; text-transform: uppercase; margin-top: 20px; letter-spacing: 1px; }
        label { font-size: 9px; text-transform: uppercase; color: #aaa; display: block; margin-top: 8px; }
        
        select, input[type="range"] { 
            width: 100%; margin-top: 4px; background: rgba(255,255,255,0.08); color: white; 
            border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 13px;
            box-sizing: border-box; outline: none;
        }

        .row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: #55acee; }
        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="close-menu">✕</button>
        <div style="font-size: 14px; font-weight: bold; color: #55acee;">VISOR PRO 3D</div>
        
        <div class="section-title">Modelo</div>
        <label>Seleccionar Objeto</label>
        <select id="model-select"><option>Cargando...</option></select>
        
        <label>Rotación Horizontal</label>
        <input type="range" id="model-rotation" min="0" max="6.28" step="0.01" value="0">
        
        <div class="row">
            <label style="margin:0">Giro Automático</label>
            <input type="checkbox" id="auto-rotate">
        </div>

        <div class="section-title">Ambiente</div>
        <label>Exposición (Brillo)</label>
        <input type="range" id="exposure-slider" min="0.1" max="4" step="0.1" value="1.2">
        
        <div class="section-title">Luz y Sombras</div>
        <label>Ángulo de la Luz</label>
        <input type="range" id="light-angle" min="0" max="6.28" step="0.01" value="0.7">
        
        <label>Intensidad</label>
        <input type="range" id="light-intensity" min="0" max="4" step="0.1" value="1">
        
        <label>Opacidad Suelo</label>
        <input type="range" id="shadow-opacity" min="0" max="1" step="0.05" value="0.4">
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
