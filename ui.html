<div id="ui">
    <div class="mobile-handle"></div>

    <div class="ui-header">
        <div class="brand">ESTUDIO <span>3D</span></div>
        <button id="close-menu">✕</button>
    </div>

    <div class="ui-tabs">
        <button class="tab-btn active" data-tab="tab-model">📦 OBJETO</button>
        <button class="tab-btn" data-tab="tab-light">🔆 ESCENA</button>
    </div>

    <div class="ui-content">
        <div id="tab-model" class="tab-pane active">
            <div class="control-group">
                <label>Modelo Activo</label>
                <select id="model-select"><option>Cargando...</option></select>
            </div>
            
            <div class="control-group row-flex">
                <label>Giro Automático</label>
                <label class="switch">
                    <input type="checkbox" id="auto-rotate">
                    <span class="slider-round"></span>
                </label>
            </div>

            <div class="control-group">
                <label>Rotación Manual</label>
                <input type="range" id="model-rotation" min="0" max="6.28" step="0.01">
            </div>
        </div>

        <div id="tab-light" class="tab-pane">
            <div class="control-group">
                <label>Exposición HDR</label>
                <input type="range" id="exposure-slider" min="0.1" max="4" step="0.1" value="1.2">
            </div>
            
            <div class="control-group">
                <label>Ángulo de Luz</label>
                <input type="range" id="light-angle" min="0" max="6.28" step="0.01">
            </div>
            
            <div class="control-group">
                <label>Intensidad de Luz</label>
                <input type="range" id="light-intensity" min="0" max="4" step="0.1">
            </div>
            
            <div class="control-group">
                <label>Opacidad de Sombra</label>
                <input type="range" id="shadow-opacity" min="0" max="1" step="0.05">
            </div>
        </div>
    </div>
</div>

<button id="open-menu">☰ AJUSTES</button>
